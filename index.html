<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mirror Memory</title>
    <link rel="icon" href="favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="wrap">
      <header class="top">
        <div class="brand">
          <h1>Mirror Memory</h1>
          <p class="sub">
            Empareja imágenes. Minimiza intentos. Baja el tiempo.
          </p>
        </div>

        <section class="panel" aria-label="Controles y estadísticas">
          <div class="controls">
            <label class="select">
              <span>Dificultad</span>
              <select id="difficulty" aria-label="Seleccionar dificultad">
                <option value="4">4×4 (Fácil)</option>
                <option value="6" selected>6×6 (Medio)</option>
                <option value="8">8×8 (Difícil)</option>
              </select>
            </label>

            <button id="btnNew" class="btn">Nueva partida</button>
            <button
              id="btnPeek"
              class="btn ghost"
              title="Muestra 1s todas las cartas"
            >
              Peek
            </button>
          </div>

          <div class="stats">
            <div class="stat">
              <span class="k">Tiempo</span>
              <span class="v" id="time">00:00</span>
            </div>
            <div class="stat">
              <span class="k">Intentos</span>
              <span class="v" id="moves">0</span>
            </div>
            <div class="stat">
              <span class="k">Aciertos</span>
              <span class="v" id="matches">0</span>
            </div>
            <div class="stat">
              <span class="k">Récord</span>
              <span class="v" id="best">—</span>
            </div>
          </div>
        </section>
      </header>

      <section class="board-wrap">
        <div
          id="board"
          class="board"
          role="grid"
          aria-label="Tablero de cartas"
        ></div>

        <div id="toast" class="toast" aria-live="polite"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
